<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Visa -->
  <rect x="0" y="5" width="40" height="30" rx="4" fill="#1A1F71"/>
  <text x="20" y="25" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">VISA</text>
  
  <!-- Mastercard -->
  <rect x="50" y="5" width="40" height="30" rx="4" fill="#EB001B"/>
  <circle cx="60" cy="20" r="8" fill="#F79E1B"/>
  <circle cx="80" cy="20" r="8" fill="#EB001B"/>
  
  <!-- PayPal -->
  <rect x="100" y="5" width="40" height="30" rx="4" fill="#003087"/>
  <text x="120" y="25" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">PayPal</text>
  
  <!-- Stripe -->
  <rect x="150" y="5" width="40" height="30" rx="4" fill="#635BFF"/>
  <text x="170" y="25" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Stripe</text>
</svg>
